<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZ PREMIUM - High-Speed Tunneling Infrastructure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --primary: #0062ff;
            --secondary: #00d4ff;
            --bg: #030508;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #030508 80%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .kz-logo { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }
        
        .premium-card {
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 98, 255, 0.15);
        }

        .glow-button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .status-dot {
            width: 8px; height: 8px; background: #10b981; border-radius: 50%;
            box-shadow: 0 0 12px #10b981;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .messenger-float { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="selection:bg-blue-500 selection:text-white">

    <nav class="sticky top-0 z-[100] px-6 py-5 border-b border-white/5 backdrop-blur-xl bg-black/20">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer select-none group" ondblclick="toggleAdmin()">
                <div class="relative w-14 h-14 bg-black rounded-2xl flex items-center justify-center border border-white/10 group-active:scale-90 transition">
                    <span class="kz-logo text-white font-black text-2xl">KZ</span>
                    <div class="absolute -inset-1 bg-blue-500 rounded-2xl blur opacity-20 group-hover:opacity-50 transition"></div>
                </div>
                <div>
                    <h1 class="kz-logo text-xl font-black text-white uppercase">KZ <span class="text-blue-500 italic">PREMIUM</span></h1>
                    <p class="text-[9px] tracking-[0.3em] font-bold text-blue-400/60 uppercase">Encrypted Infrastructure</p>
                </div>
            </div>
            <div class="hidden md:flex items-center gap-3 bg-white/5 px-5 py-2.5 rounded-full border border-white/10">
                <div class="status-dot animate-pulse"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">Core Active</span>
            </div>
        </div>
    </nav>

    <section id="admin-panel" class="hidden fixed inset-0 z-[150] bg-[#030508]/98 backdrop-blur-3xl p-6 md:p-16 overflow-y-auto">
        <div class="container mx-auto max-w-6xl">
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-3xl font-black tracking-tighter flex items-center gap-4 text-white">
                    <i class="fas fa-terminal text-blue-500"></i> ADMIN CONTROL
                </h2>
                <button onclick="toggleAdmin()" class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center hover:bg-red-500 transition text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 premium-card p-8 rounded-[2.5rem] border-t-2 border-blue-500">
                    <div class="space-y-5">
                        <input type="text" id="admName" placeholder="Config Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm text-white">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="admProto" class="bg-[#0a0f19] border border-white/10 p-4 rounded-2xl text-xs font-bold outline-none text-white">
                                <option value="UDP">UDP (Gaming)</option>
                                <option value="VLESS">VLESS (Ultra)</option>
                                <option value="VMESS">VMESS (Secure)</option>
                                <option value="SSH">Open SSH</option>
                            </select>
                            <select id="admFlag" class="bg-[#0a0f19] border border-white/10 p-4 rounded-2xl text-xs outline-none text-white">
                                <option value="🇸🇬">Singapore 🇸🇬</option>
                                <option value="🇹🇭">Thailand 🇹🇭</option>
                                <option value="🇲🇲">Myanmar 🇲🇲</option>
                                <option value="🇯🇵">Japan 🇯🇵</option>
                                <option value="🇺🇸">USA 🇺🇸</option>
                            </select>
                        </div>
                        <textarea id="admKey" rows="5" placeholder="Paste Config Key..." class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl font-mono text-[10px] outline-none focus:border-blue-500 text-white"></textarea>
                        <button onclick="publishServer()" class="w-full glow-button py-4 rounded-2xl font-black text-white text-xs tracking-widest active:scale-95 transition shadow-lg">DEPLOY SERVER</button>
                    </div>
                </div>

                <div class="lg:col-span-2 premium-card p-8 rounded-[2.5rem] border-t-2 border-red-500/50">
                    <h3 class="text-xs font-black text-gray-500 mb-6 tracking-widest uppercase">Active Infrastructure</h3>
                    <div id="admin-manage-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[500px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-6 py-16">
        <div class="text-center mb-24">
            <h2 class="text-5xl md:text-7xl font-black mb-6 tracking-tighter text-white uppercase">
                Premium <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-cyan-400 italic">Network.</span>
            </h2>
            <p class="text-gray-500 max-w-xl mx-auto text-sm leading-relaxed tracking-wide">
                Experience ultra-low latency and top-tier security. Optimized for Gaming and Streaming.
            </p>
        </div>

        <div id="server-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </main>

    <a href="https://m.me/kyawsoe.oo.1292019" target="_blank" class="fixed bottom-10 right-10 z-[200] messenger-float group">
        <div class="absolute -inset-3 bg-blue-600 rounded-full blur opacity-20 group-hover:opacity-60 transition duration-500"></div>
        <div class="relative w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl border border-white/20 transition-transform group-hover:scale-110 group-hover:-rotate-12">
            <i class="fab fa-facebook-messenger text-white text-3xl"></i>
            <span class="absolute -top-1 -right-1 flex h-5 w-5">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-5 w-5 bg-green-500 border-2 border-black"></span>
            </span>
        </div>
        <div class="absolute right-24 top-1/2 -translate-y-1/2 bg-white text-black text-[10px] font-black px-4 py-2 rounded-xl opacity-0 group-hover:opacity-100 transition-all pointer-events-none whitespace-nowrap tracking-tighter shadow-2xl translate-x-4 group-hover:translate-x-0">
            CONTACT KYAW SOE OO
        </div>
    </a>

    <div id="captchaModal" class="fixed inset-0 bg-black/98 hidden flex items-center justify-center p-6 z-[200] backdrop-blur-3xl">
        <div class="premium-card p-12 rounded-[3.5rem] w-full max-w-sm text-center relative border-blue-500/30">
            <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-blue-600/40 rotate-12">
                <i class="fas fa-shield-check text-white text-3xl -rotate-12"></i>
            </div>
            <h3 class="text-2xl font-black mb-2 mt-6 text-white uppercase">Verify</h3>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-10">Accessing High-Speed Key</p>
            <div id="math-quest" class="text-6xl font-black mb-10 text-white tracking-tighter"></div>
            <input type="number" id="ansInput" placeholder="?" class="w-full bg-white/5 border-b-2 border-blue-600/50 p-4 text-center text-5xl mb-12 outline-none focus:border-blue-500 font-black text-white">
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 text-gray-500 font-bold text-[10px] tracking-widest uppercase">Cancel</button>
                <button onclick="verifyAndCopy()" class="flex-1 glow-button py-4 rounded-2xl font-black text-white text-[10px] tracking-widest active:scale-95 transition">Verify</button>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center opacity-30">
        <p class="kz-logo text-[10px] font-black tracking-[0.5em] uppercase">KZ INFRASTRUCTURE © 2026</p>
    </footer>

    <script>
        let servers = JSON.parse(localStorage.getItem('kz_premium_vfinal')) || [];
        let tempKey = ""; let tempAns = 0;

        function toggleAdmin() {
            const panel = document.getElementById('admin-panel');
            panel.classList.toggle('hidden');
            if(!panel.classList.contains('hidden')) renderAdminManage();
        }

        function publishServer() {
            const name = document.getElementById('admName').value;
            const proto = document.getElementById('admProto').value;
            const flag = document.getElementById('admFlag').value;
            const key = document.getElementById('admKey').value;
            if(!name || !key) return alert("Fill all fields.");
            servers.push({ name, proto, flag, key, id: Date.now() });
            save();
            document.getElementById('admName').value = "";
            document.getElementById('admKey').value = "";
            renderAdminManage();
        }

        function renderServers() {
            const list = document.getElementById('server-list');
            if(servers.length === 0) {
                list.innerHTML = `<div class="col-span-full text-center py-20 text-gray-800 font-black tracking-widest uppercase text-[10px]">No Infrastructure Online.</div>`;
                return;
            }
            list.innerHTML = servers.map(s => `
                <div class="premium-card p-10 rounded-[3rem] relative group overflow-hidden">
                    <div class="flex justify-between items-center mb-10">
                        <span class="text-6xl drop-shadow-2xl">${s.flag}</span>
                        <span class="text-[9px] font-black bg-white/5 text-blue-400 px-4 py-2 rounded-xl border border-white/5 tracking-widest uppercase">${s.proto}</span>
                    </div>
                    <h3 class="text-2xl font-black mb-2 text-white group-hover:text-blue-500 transition-colors uppercase">${s.name}</h3>
                    <div class="flex items-center gap-3 mb-10">
                        <div class="status-dot"></div>
                        <span class="text-[9px] font-bold text-gray-600 tracking-widest uppercase">Verified Stable</span>
                    </div>
                    <button onclick="openCaptcha('${s.key}')" class="w-full py-5 rounded-2xl font-black text-[10px] tracking-widest uppercase bg-white/5 hover:bg-blue-600 hover:text-white transition-all active:scale-95 shadow-xl border border-white/5 hover:border-transparent">
                        Access Key
                    </button>
                </div>
            `).join('');
        }

        function renderAdminManage() {
            const list = document.getElementById('admin-manage-list');
            list.innerHTML = servers.map(s => `
                <div class="flex justify-between items-center bg-white/5 p-5 rounded-[1.8rem] border border-white/5">
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">${s.flag}</span>
                        <div>
                            <p class="text-[11px] font-black text-white uppercase tracking-tighter">${s.name}</p>
                            <p class="text-[8px] text-blue-500 font-bold uppercase tracking-widest">${s.proto}</p>
                        </div>
                    </div>
                    <button onclick="deleteServer(${s.id})" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition flex items-center justify-center">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                </div>
            `).join('');
        }

        function deleteServer(id) {
            if(confirm('Terminate?')) {
                servers = servers.filter(s => s.id !== id);
                save();
                renderAdminManage();
            }
        }

        function save() {
            localStorage.setItem('kz_premium_vfinal', JSON.stringify(servers));
            renderServers();
        }

        function openCaptcha(key) {
            tempKey = key;
            const n1 = Math.floor(Math.random() * 10); const n2 = Math.floor(Math.random() * 10);
            tempAns = n1 + n2;
            document.getElementById('math-quest').innerText = `${n1} + ${n2}`;
            document.getElementById('captchaModal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('captchaModal').classList.add('hidden'); 
            document.getElementById('ansInput').value = ""; 
        }

        function verifyAndCopy() {
            if(parseInt(document.getElementById('ansInput').value) === tempAns) {
                navigator.clipboard.writeText(tempKey);
                alert("Copied to Clipboard.");
                closeModal();
            } else { alert("Wrong."); }
        }

        renderServers();
    </script>
</body>
</html>
